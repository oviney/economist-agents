name: Blog Quality Audit

on:
  # Manual-only (ADR-0014 / B-009). The weekly cron was removed: with no
  # upstream producer it re-scanned a static back-catalogue and re-filed issues
  # every Monday (existing_issue_title() dedupes on state=open only, so closed
  # issues resurrected). Run on demand — use dry_run first.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — score posts but do not create issues'
        default: 'false'
        type: boolean

jobs:
  audit:
    name: Weekly Blog Quality Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run blog quality audit
        env:
          # Free GitHub token only — the audit is heuristic (ArticleEvaluator),
          # no paid AI. The vestigial OpenAI key was removed (B-009).
          GH_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python scripts/blog_quality_audit.py

      - name: Upload audit log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blog-audit-${{ github.run_number }}
          path: logs/blog_audit.json
          retention-days: 90
