name: Content Generation Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Article topic (leave empty for auto-discovery)'
        required: false
        type: string

  schedule:
    # Run every Monday at 9am UTC
    - cron: '0 9 * * 1'

  repository_dispatch:
    types: [blog-remediation-ready]

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Cache ChromaDB vector store for Style Memory RAG
      - name: Cache ChromaDB Vector Store
        uses: actions/cache@v4
        with:
          path: .chromadb
          key: chromadb-v1-${{ hashFiles('archived/**/*.md', 'src/tools/style_memory_tool.py') }}
          restore-keys: |
            chromadb-v1-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Article via Flow Pipeline
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
          TOPIC_SCOUT_ALLOW_EMPTY_ARCHIVE: "1"
        run: |
          python -c "
          from src.economist_agents.flow import EconomistContentFlow
          from pathlib import Path
          from datetime import datetime
          import json

          flow = EconomistContentFlow()
          result = flow.kickoff()

          status = result.get('status', 'unknown')
          article = result.get('article', '')
          score = result.get('editorial_score', 0)

          print(f'Status: {status}')
          print(f'Editorial Score: {score}/100')
          print(f'Word count: {len(article.split())}')

          # Save article to output/
          if status == 'published' and article:
              output_dir = Path('output')
              output_dir.mkdir(exist_ok=True)

              # Extract title for filename
              title_slug = 'generated-article'
              for line in article.split('\n'):
                  if line.strip().startswith('title:'):
                      raw_title = line.split(':', 1)[1].strip().strip('\"')
                      title_slug = raw_title.lower()
                      for ch in [' ', ':', '?', '!', ',', '.', '\"', \"'\", '(', ')']:
                          title_slug = title_slug.replace(ch, '-')
                      title_slug = title_slug.strip('-')[:60]
                      break

              date_str = datetime.now().strftime('%Y-%m-%d')
              filename = f'{date_str}-{title_slug}.md'
              filepath = output_dir / filename
              filepath.write_text(article)
              print(f'Saved: {filepath}')

              # Write outputs for downstream steps
              with open('article_path.txt', 'w') as f:
                  f.write(str(filepath))
              with open('article_title.txt', 'w') as f:
                  f.write(raw_title if 'raw_title' in dir() else title_slug)
          else:
              print(f'Article not published: {status}')
              issues = result.get('validation_issues', [])
              if issues:
                  print(f'Issues: {issues}')
              exit(1)
          "

      # Observability metrics pipeline — runs after every article generation
      # and updates logs/quality_dashboard.json within the 5-minute SLA.
      - name: Update Observability Metrics Dashboard
        if: success() || failure()
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/quality_metrics.py
          echo "Dashboard updated: logs/quality_dashboard.json"

      # Agent performance metrics — appends one row to data/metrics.db
      # so the Streamlit dashboard can track quality, cost, and run outcomes
      # over time. Runs regardless of article generation success/failure.
      - name: Record Pipeline Metrics
        if: success() || failure()
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Derive status and scores from pipeline outputs.
          # editorial_score and gates_passed use placeholder values here
          # because the flow currently emits them only to stdout; a future
          # improvement is to write a structured JSON result file and read
          # it here for accurate per-run metrics.
          TOPIC="${{ github.event.inputs.topic }}"
          STATUS="failed"
          SCORE=0   # placeholder: updated to 80 when article_path.txt exists
          GATES=0   # placeholder: updated to 5  when article_path.txt exists

          if [ -f article_path.txt ]; then
            STATUS="published"
            SCORE=80
            GATES=5
          fi

          python scripts/record_metrics.py \
            --agent "flow_pipeline" \
            --topic "${TOPIC:-auto}" \
            --editorial-score "${SCORE}" \
            --gates-passed "${GATES}" \
            --status "${STATUS}"
          echo "Metrics recorded to data/metrics.db"

      - name: Upload generated content
        uses: actions/upload-artifact@v4
        with:
          name: generated-article
          path: |
            output/*.md
            output/charts/*.png
            output/images/*.png
            logs/quality_dashboard.json

      # Publish directly to blog repo main branch (no PR needed —
      # article already passed 5 editorial gates + publication validator)
      - name: Publish to Blog Repository
        if: vars.BLOG_REPO_OWNER && vars.BLOG_REPO_NAME
        env:
          BLOG_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
          BLOG_OWNER: ${{ vars.BLOG_REPO_OWNER }}
          BLOG_REPO: ${{ vars.BLOG_REPO_NAME }}
        run: |
          git config --global user.name "Economist Agent Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${BLOG_TOKEN}@github.com/${BLOG_OWNER}/${BLOG_REPO}.git blog-repo
          cd blog-repo

          # Copy only the validated article (not all output/*.md)
          mkdir -p _posts assets/charts assets/images
          ARTICLE_PATH=$(cat ../article_path.txt 2>/dev/null || echo "")
          # Resolve relative path against workspace root (we're in blog-repo/)
          if [ -n "$ARTICLE_PATH" ] && [ ! -f "$ARTICLE_PATH" ] && [ -f "../$ARTICLE_PATH" ]; then
            ARTICLE_PATH="../$ARTICLE_PATH"
          fi
          if [ -z "$ARTICLE_PATH" ] || [ ! -f "$ARTICLE_PATH" ]; then
            echo "❌ No article_path.txt or file not found — aborting deploy"
            exit 1
          fi
          cp "$ARTICLE_PATH" _posts/
          ARTICLE_BASENAME=$(basename "$ARTICLE_PATH" .md)
          cp "../output/charts/${ARTICLE_BASENAME}.png" assets/charts/ 2>/dev/null || true
          cp "../output/images/${ARTICLE_BASENAME}.png" assets/images/ 2>/dev/null || true

          # Generate WebP versions so blog's responsive-image include doesn't break HTML-Proofer
          cat > /tmp/gen_webp.py << 'PYEOF'
          import os, pathlib
          try:
              from PIL import Image
              basename = os.environ['BASENAME']
              for src_path in [
                  pathlib.Path(f'assets/images/{basename}.png'),
                  pathlib.Path(f'assets/charts/{basename}.png'),
              ]:
                  if src_path.exists():
                      dst = src_path.with_suffix('.webp')
                      with Image.open(src_path) as im:
                          im.save(dst, 'WebP', quality=85)
                      print(f'Generated {dst}')
                  else:
                      print(f'Skipped (not found): {src_path}')
          except Exception as e:
              print(f'Warning: WebP generation failed: {e} -- continuing without WebP')
          PYEOF
          BASENAME="$ARTICLE_BASENAME" python3 /tmp/gen_webp.py

          # Commit and push directly to main
          git add "_posts/$(basename "$ARTICLE_PATH")" assets/charts/ assets/images/
          ARTICLE_TITLE=$(cat ../article_title.txt 2>/dev/null || echo "Generated Article")
          git commit -m "content: ${ARTICLE_TITLE}

          Published automatically by economist-agents Flow pipeline.
          Editorial score: passed 5/5 quality gates + publication validator.

          🤖 Generated by economist-agents" || exit 0

          git push origin main

      # Post-deployment quality check (shift-right editorial judge)
      - name: Editorial Judge — Post-Deployment QA
        if: vars.BLOG_REPO_OWNER && vars.BLOG_REPO_NAME
        env:
          GH_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          ARTICLE_FILE=$(ls output/*.md 2>/dev/null | head -1 | xargs basename)
          if [ -n "$ARTICLE_FILE" ]; then
            python scripts/editorial_judge.py \
              --blog-owner "${{ vars.BLOG_REPO_OWNER }}" \
              --blog-repo "${{ vars.BLOG_REPO_NAME }}" \
              --article "$ARTICLE_FILE" \
              --create-issue-on-failure
          else
            echo "No article found to judge"
          fi

      # Fallback: commit to this repo
      - name: Commit article (fallback)
        if: ${{ !vars.BLOG_REPO_OWNER }}
        run: |
          git config user.name "Economist Agent Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.md output/charts/*.png 2>/dev/null || true
          git commit -m "content: Add generated article" || exit 0
          git push origin main
