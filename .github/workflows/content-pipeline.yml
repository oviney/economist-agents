name: Content Generation Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Article topic (leave empty for auto-discovery)'
        required: false
        type: string

  schedule:
    # Run every Monday at 9am UTC
    - cron: '0 9 * * 1'

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Cache ChromaDB vector store for Style Memory RAG
      - name: Cache ChromaDB Vector Store
        uses: actions/cache@v4
        with:
          path: .chromadb
          key: chromadb-v1-${{ hashFiles('archived/**/*.md', 'src/tools/style_memory_tool.py') }}
          restore-keys: |
            chromadb-v1-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Article via Flow Pipeline
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -c "
          from src.economist_agents.flow import EconomistContentFlow
          from pathlib import Path
          from datetime import datetime
          import json

          flow = EconomistContentFlow()
          result = flow.kickoff()

          status = result.get('status', 'unknown')
          article = result.get('article', '')
          score = result.get('editorial_score', 0)

          print(f'Status: {status}')
          print(f'Editorial Score: {score}/100')
          print(f'Word count: {len(article.split())}')

          # Save article to output/
          if status == 'published' and article:
              output_dir = Path('output')
              output_dir.mkdir(exist_ok=True)

              # Extract title for filename
              title_slug = 'generated-article'
              for line in article.split('\n'):
                  if line.strip().startswith('title:'):
                      raw_title = line.split(':', 1)[1].strip().strip('\"')
                      title_slug = raw_title.lower()
                      for ch in [' ', ':', '?', '!', ',', '.', '\"', \"'\", '(', ')']:
                          title_slug = title_slug.replace(ch, '-')
                      title_slug = title_slug.strip('-')[:60]
                      break

              date_str = datetime.now().strftime('%Y-%m-%d')
              filename = f'{date_str}-{title_slug}.md'
              filepath = output_dir / filename
              filepath.write_text(article)
              print(f'Saved: {filepath}')

              # Write outputs for downstream steps
              with open('article_path.txt', 'w') as f:
                  f.write(str(filepath))
              with open('article_title.txt', 'w') as f:
                  f.write(raw_title if 'raw_title' in dir() else title_slug)
          else:
              print(f'Article not published: {status}')
              issues = result.get('validation_issues', [])
              if issues:
                  print(f'Issues: {issues}')
              exit(1)
          "

      - name: Upload generated content
        uses: actions/upload-artifact@v4
        with:
          name: generated-article
          path: |
            output/*.md
            output/charts/*.png
            output/images/*.png

      # Publish directly to blog repo main branch (no PR needed —
      # article already passed 5 editorial gates + publication validator)
      - name: Publish to Blog Repository
        if: vars.BLOG_REPO_OWNER && vars.BLOG_REPO_NAME
        env:
          BLOG_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
          BLOG_OWNER: ${{ vars.BLOG_REPO_OWNER }}
          BLOG_REPO: ${{ vars.BLOG_REPO_NAME }}
        run: |
          git config --global user.name "Economist Agent Bot"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone https://x-access-token:${BLOG_TOKEN}@github.com/${BLOG_OWNER}/${BLOG_REPO}.git blog-repo
          cd blog-repo

          # Copy generated files to Jekyll structure
          mkdir -p _posts assets/charts assets/images
          cp ../output/*.md _posts/ 2>/dev/null || true
          cp ../output/charts/*.png assets/charts/ 2>/dev/null || true
          cp ../output/images/*.png assets/images/ 2>/dev/null || true

          # Commit and push directly to main
          git add _posts/*.md assets/charts/*.png assets/images/*.png
          ARTICLE_TITLE=$(cat ../article_title.txt 2>/dev/null || echo "Generated Article")
          git commit -m "content: ${ARTICLE_TITLE}

          Published automatically by economist-agents Flow pipeline.
          Editorial score: passed 5/5 quality gates + publication validator.

          🤖 Generated by economist-agents" || exit 0

          git push origin main

      # Post-deployment quality check (shift-right editorial judge)
      - name: Editorial Judge — Post-Deployment QA
        if: vars.BLOG_REPO_OWNER && vars.BLOG_REPO_NAME
        env:
          GH_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          ARTICLE_FILE=$(ls output/*.md 2>/dev/null | head -1 | xargs basename)
          if [ -n "$ARTICLE_FILE" ]; then
            python scripts/editorial_judge.py \
              --blog-owner "${{ vars.BLOG_REPO_OWNER }}" \
              --blog-repo "${{ vars.BLOG_REPO_NAME }}" \
              --article "$ARTICLE_FILE" \
              --create-issue-on-failure
          else
            echo "No article found to judge"
          fi

      # Fallback: commit to this repo
      - name: Commit article (fallback)
        if: ${{ !vars.BLOG_REPO_OWNER }}
        run: |
          git config user.name "Economist Agent Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.md output/charts/*.png 2>/dev/null || true
          git commit -m "content: Add generated article" || exit 0
          git push origin main
