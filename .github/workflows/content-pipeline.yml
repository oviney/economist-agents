name: Content Generation Pipeline

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Article topic (leave empty for auto-discovery)'
        required: false
        type: string

  schedule:
    # Run every Monday at 9am UTC
    - cron: '0 9 * * 1'

  repository_dispatch:
    types: [blog-remediation-ready]

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Cache ChromaDB vector store for Style Memory RAG
      - name: Cache ChromaDB Vector Store
        uses: actions/cache@v4
        with:
          path: .chromadb
          key: chromadb-v1-${{ hashFiles('archived/**/*.md', 'src/tools/style_memory_tool.py') }}
          restore-keys: |
            chromadb-v1-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Article via Flow Pipeline
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
          TOPIC_SCOUT_ALLOW_EMPTY_ARCHIVE: "1"
        run: |
          python -c "
          from src.economist_agents.flow import EconomistContentFlow
          from pathlib import Path
          from datetime import datetime
          import json

          flow = EconomistContentFlow()
          result = flow.kickoff()

          status = result.get('status', 'unknown')
          article = result.get('article', '')
          score = result.get('editorial_score', 0)

          print(f'Status: {status}')
          print(f'Editorial Score: {score}/100')
          print(f'Word count: {len(article.split())}')

          # Save article to output/
          if status == 'published' and article:
              output_dir = Path('output')
              output_dir.mkdir(exist_ok=True)

              # Extract title for filename
              title_slug = 'generated-article'
              for line in article.split('\n'):
                  if line.strip().startswith('title:'):
                      raw_title = line.split(':', 1)[1].strip().strip('\"')
                      title_slug = raw_title.lower()
                      for ch in [' ', ':', '?', '!', ',', '.', '\"', \"'\", '(', ')']:
                          title_slug = title_slug.replace(ch, '-')
                      title_slug = title_slug.strip('-')[:60]
                      break

              date_str = datetime.now().strftime('%Y-%m-%d')
              filename = f'{date_str}-{title_slug}.md'
              filepath = output_dir / filename
              filepath.write_text(article)
              print(f'Saved: {filepath}')

              # Write outputs for downstream steps
              with open('article_path.txt', 'w') as f:
                  f.write(str(filepath))
              with open('article_title.txt', 'w') as f:
                  f.write(raw_title if 'raw_title' in dir() else title_slug)
          else:
              print(f'Article not published: {status}')
              issues = result.get('validation_issues', [])
              if issues:
                  print(f'Issues: {issues}')
              exit(1)
          "

      # Observability metrics pipeline — runs after every article generation
      # and updates logs/quality_dashboard.json within the 5-minute SLA.
      - name: Update Observability Metrics Dashboard
        if: success() || failure()
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/quality_metrics.py
          echo "Dashboard updated: logs/quality_dashboard.json"

      # Agent performance metrics — appends one row to data/metrics.db
      # so the Streamlit dashboard can track quality, cost, and run outcomes
      # over time. Runs regardless of article generation success/failure.
      - name: Record Pipeline Metrics
        if: success() || failure()
        env:
          PYTHONPATH: ${{ github.workspace }}
          PIPELINE_TOPIC: ${{ github.event.inputs.topic }}
        run: |
          TOPIC="${PIPELINE_TOPIC:-}"
          STATUS="failed"
          SCORE=0
          GATES=0

          if [ -f output/pipeline_result.json ]; then
            STATUS=$(jq -r '.status // "failed"'           output/pipeline_result.json)
            SCORE=$(jq -r  '.editorial_score // 0'         output/pipeline_result.json)
            GATES=$(jq -r  '.gates_passed // 0 | floor'   output/pipeline_result.json)
          fi

          python scripts/record_metrics.py \
            --agent "flow_pipeline" \
            --topic "${TOPIC:-auto}" \
            --editorial-score "${SCORE}" \
            --gates-passed "${GATES}" \
            --status "${STATUS}"
          echo "Metrics recorded to data/metrics.db"

      - name: Upload generated content
        uses: actions/upload-artifact@v4
        with:
          name: generated-article
          path: |
            output/*.md
            output/charts/*.png
            output/images/*.png
            logs/quality_dashboard.json

      # Publish to blog repo. Heavy lifting (clone, copy, validate, commit,
      # push, PR) lives in scripts/deploy_to_blog.py so the same code runs
      # in CI, locally, and from flow.publish_article(). See issue #336.
      - name: Publish to Blog Repository
        if: vars.BLOG_REPO_OWNER && vars.BLOG_REPO_NAME
        env:
          BLOG_REPO_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
          BLOG_OWNER: ${{ vars.BLOG_REPO_OWNER }}
          BLOG_REPO_NAME: ${{ vars.BLOG_REPO_NAME }}
          GH_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m scripts.deploy_to_blog \
            --blog-owner "${BLOG_OWNER}" \
            --blog-repo "${BLOG_REPO_NAME}" \
            --token "${BLOG_REPO_TOKEN}"

      # Post-deployment quality check (shift-right editorial judge)
      - name: Editorial Judge — Post-Deployment QA
        if: vars.BLOG_REPO_OWNER && vars.BLOG_REPO_NAME
        env:
          GH_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          ARTICLE_FILE=$(ls output/*.md 2>/dev/null | head -1 | xargs basename)
          if [ -n "$ARTICLE_FILE" ]; then
            python scripts/editorial_judge.py \
              --blog-owner "${{ vars.BLOG_REPO_OWNER }}" \
              --blog-repo "${{ vars.BLOG_REPO_NAME }}" \
              --article "$ARTICLE_FILE" \
              --create-issue-on-failure
          else
            echo "No article found to judge"
          fi

      # Fallback: commit to this repo
      - name: Commit article (fallback)
        if: ${{ !vars.BLOG_REPO_OWNER }}
        run: |
          git config user.name "Economist Agent Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/*.md output/charts/*.png 2>/dev/null || true
          git commit -m "content: Add generated article" || exit 0
          git push origin main
