name: Regenerate Featured Image

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Post image slug (e.g. understanding-qa-qc-quality-engineering)'
        required: true
        type: string
      topic:
        description: 'Article headline / topic'
        required: true
        type: string
      summary:
        description: 'One-sentence article summary (for DALL-E prompt)'
        required: true
        type: string
      mood:
        description: 'Image mood'
        required: false
        default: 'contemplative'
        type: choice
        options:
          - contemplative
          - satirical
          - urgent
          - ironic
          - wry

jobs:
  regenerate-image:
    runs-on: ubuntu-latest
    env:
      SLUG: ${{ inputs.slug }}
      TOPIC: ${{ inputs.topic }}
      SUMMARY: ${{ inputs.summary }}
      MOOD: ${{ inputs.mood }}
    steps:
      - name: Validate inputs
        run: |
          if [[ ! "$SLUG" =~ ^[a-z0-9][a-z0-9-]{0,79}$ ]]; then
            echo "::error::Invalid slug '$SLUG': must match ^[a-z0-9][a-z0-9-]{0,79}$"
            exit 1
          fi
          if [[ ${#TOPIC} -gt 200 ]]; then
            echo "::error::topic exceeds 200 characters"
            exit 1
          fi
          if [[ ${#SUMMARY} -gt 500 ]]; then
            echo "::error::summary exceeds 500 characters"
            exit 1
          fi
          valid_moods="contemplative satirical urgent ironic wry"
          if [[ ! " $valid_moods " =~ " $MOOD " ]]; then
            echo "::error::Invalid mood '$MOOD': must be one of: $valid_moods"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install openai pillow requests

      - name: Generate featured image via DALL-E 3
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p output/images
          python scripts/featured_image_agent.py \
            --topic "$TOPIC" \
            --summary "$SUMMARY" \
            --mood "$MOOD" \
            --output "output/images/$SLUG.png"

      - name: Convert PNG to WebP
        env:
          IMG_SLUG: ${{ env.SLUG }}
        run: |
          python3 -c "
          import os
          from PIL import Image
          slug = os.environ['IMG_SLUG']
          src = f'output/images/{slug}.png'
          dst = f'output/images/{slug}.webp'
          Image.open(src).save(dst, 'WebP', quality=85)
          print(f'WebP written: {dst}')
          "

      - name: Validate output dimensions
        env:
          IMG_SLUG: ${{ env.SLUG }}
        run: |
          python3 -c "
          import os
          from PIL import Image
          slug = os.environ['IMG_SLUG']
          img = Image.open(f'output/images/{slug}.png')
          w, h = img.size
          assert w >= 800 and h >= 400, f'Image too small: {w}x{h}'
          print(f'OK: {w}x{h}')
          sz = os.path.getsize(f'output/images/{slug}.png')
          assert sz > 100_000, f'Suspiciously small ({sz} bytes) — likely not a real DALL-E image'
          print(f'File size OK: {sz/1024:.0f} KB')
          "

      - name: Push image to blog repository
        if: vars.BLOG_REPO_OWNER && vars.BLOG_REPO_NAME
        env:
          BLOG_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
          BLOG_OWNER: ${{ vars.BLOG_REPO_OWNER }}
          BLOG_REPO: ${{ vars.BLOG_REPO_NAME }}
          GH_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
        run: |
          git clone --depth=1 https://x-access-token:${BLOG_TOKEN}@github.com/${BLOG_OWNER}/${BLOG_REPO}.git blog-repo
          cp output/images/$SLUG.png blog-repo/assets/images/$SLUG.png
          cp output/images/$SLUG.webp blog-repo/assets/images/$SLUG.webp
          cd blog-repo
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b fix/regenerate-image-$SLUG
          git add assets/images/$SLUG.png assets/images/$SLUG.webp
          git commit -m "fix: regenerate featured image for $SLUG

          DALL-E 3 HD 1792x1024 image generated via regenerate-image workflow.
          Replaces stub/placeholder image.

          Closes #802"
          git push origin fix/regenerate-image-$SLUG
          gh pr create \
            --repo ${BLOG_OWNER}/${BLOG_REPO} \
            --title "fix: regenerate featured image — $SLUG" \
            --base main \
            --head fix/regenerate-image-$SLUG \
            --label "bug,type:content,P2:medium" \
            --body "Regenerated via \`regenerate-image\` workflow using DALL-E 3 HD.

          Closes #802" || true
