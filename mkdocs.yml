    - Architecture Patterns: ARCHITECTURE_PATTERNS.md
    - Architecture Review Process: ARCHITECTURE_REVIEW_PROCESS.md

  - ADRs:
    - ADR-001 — Agent Framework Selection: adr/ADR-001-agent-framework-selection.md
    - ADR-002 — Content Intelligence Engine: adr/ADR-002-content-intelligence-engine.md
    - ADR-003 — Agent Skill Governance: adr/ADR-003-agent-skill-governance.md
    - ADR-004 — Python Version Constraint: ADR-004-python-version-constraint.md
    - ADR-005 — Agile Discipline Enforcement: ADR-005-agile-discipline-enforcement.md

  - Skills:
    - Agent Delegation: skills/agent-delegation/SKILL.md
    - Research Sourcing: skills/research-sourcing/SKILL.md
    - Economist Writing: skills/economist-writing/SKILL.md
    - Editorial Illustration: skills/editorial-illustration/SKILL.md
